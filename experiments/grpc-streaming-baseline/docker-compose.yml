services:
  rabbitmq:
    image: rabbitmq:3-management
    command:
      - /bin/sh
      - -c
      - rabbitmq-plugins enable --offline rabbitmq_stream rabbitmq_stream_management && rabbitmq-server
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-benchmark-cookie}
      RABBITMQ_LOGS: "-"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "5552:5552"

  nats:
    image: nats:2.10-alpine
    command:
      - "-js"
      - "-sd"
      - /data/jetstream
    ports:
      - "4222:4222"

  kafka:
    image: apache/kafka:3.9.1
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "1"
    ports:
      - "9092:9092"

  sink:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: sink
    environment:
      LISTEN_ADDR: ":50052"
      METRICS_ADDR: ":9102"
      RESULT_DIR: /results
      TRANSPORT_MODE: ${TRANSPORT_MODE:-client-streaming}
      SINK_PROCESS_DELAY_MS: ${SINK_PROCESS_DELAY_MS:-0}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_AMQP_PORT: ${RABBITMQ_AMQP_PORT:-5672}
      RABBITMQ_STREAM_PORT: ${RABBITMQ_STREAM_PORT:-5552}
      RABBITMQ_MANAGEMENT_PORT: ${RABBITMQ_MANAGEMENT_PORT:-15672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM: ${RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM:-producer-to-transformer}
      RABBITMQ_TRANSFORMER_TO_SINK_STREAM: ${RABBITMQ_TRANSFORMER_TO_SINK_STREAM:-transformer-to-sink}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_PRODUCER_TO_TRANSFORMER_SUBJECT: ${NATS_PRODUCER_TO_TRANSFORMER_SUBJECT:-producer.to.transformer}
      NATS_TRANSFORMER_TO_SINK_SUBJECT: ${NATS_TRANSFORMER_TO_SINK_SUBJECT:-transformer.to.sink}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC: ${KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC:-producer-to-transformer}
      KAFKA_TRANSFORMER_TO_SINK_TOPIC: ${KAFKA_TRANSFORMER_TO_SINK_TOPIC:-transformer-to-sink}
    ports:
      - "50052:50052"
      - "9102:9102"
    volumes:
      - ./results:/results

  transformer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: transformer
    depends_on:
      - sink
      - rabbitmq
      - nats
      - kafka
    environment:
      RUN_ID: ${RUN_ID:-grpc-stream-local}
      LISTEN_ADDR: ":50051"
      METRICS_ADDR: ":9101"
      CONCURRENCY: ${CONCURRENCY:-1}
      TRANSPORT_MODE: ${TRANSPORT_MODE:-client-streaming}
      SINK_ADDR: sink:50052
      TRANSFORMER_WORK_ITERATIONS: ${TRANSFORMER_WORK_ITERATIONS:-0}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_AMQP_PORT: ${RABBITMQ_AMQP_PORT:-5672}
      RABBITMQ_STREAM_PORT: ${RABBITMQ_STREAM_PORT:-5552}
      RABBITMQ_MANAGEMENT_PORT: ${RABBITMQ_MANAGEMENT_PORT:-15672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM: ${RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM:-producer-to-transformer}
      RABBITMQ_TRANSFORMER_TO_SINK_STREAM: ${RABBITMQ_TRANSFORMER_TO_SINK_STREAM:-transformer-to-sink}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_PRODUCER_TO_TRANSFORMER_SUBJECT: ${NATS_PRODUCER_TO_TRANSFORMER_SUBJECT:-producer.to.transformer}
      NATS_TRANSFORMER_TO_SINK_SUBJECT: ${NATS_TRANSFORMER_TO_SINK_SUBJECT:-transformer.to.sink}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC: ${KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC:-producer-to-transformer}
      KAFKA_TRANSFORMER_TO_SINK_TOPIC: ${KAFKA_TRANSFORMER_TO_SINK_TOPIC:-transformer-to-sink}
    ports:
      - "50051:50051"
      - "9101:9101"

  producer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: producer
    depends_on:
      - sink
      - transformer
      - rabbitmq
      - nats
      - kafka
    environment:
      RUN_ID: ${RUN_ID:-grpc-stream-local}
      TRANSPORT_MODE: ${TRANSPORT_MODE:-client-streaming}
      WORKLOAD_SOURCE: ${WORKLOAD_SOURCE:-synthetic}
      PROFILE: ${PROFILE:-bulk}
      TRANSFORMER_ADDR: transformer:50051
      SINK_ADMIN_ADDR: sink:50052
      RESULT_DIR: /results
      TOTAL_MESSAGES: ${TOTAL_MESSAGES:-50000}
      PAYLOAD_BYTES: ${PAYLOAD_BYTES:-1024}
      DATASET_DIR: /datasets
      DATASET_FILES: ${DATASET_FILES:-}
      DATASET_ROWS_PER_MESSAGE: ${DATASET_ROWS_PER_MESSAGE:-1}
      DATASET_REPEAT_COUNT: ${DATASET_REPEAT_COUNT:-1}
      CONCURRENCY: ${CONCURRENCY:-1}
      TARGET_MESSAGES_PER_SECOND: ${TARGET_MESSAGES_PER_SECOND:-0}
      TRANSFORMER_WORK_ITERATIONS: ${TRANSFORMER_WORK_ITERATIONS:-0}
      SINK_PROCESS_DELAY_MS: ${SINK_PROCESS_DELAY_MS:-0}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS:-0}
      RETRY_BACKOFF_MS: ${RETRY_BACKOFF_MS:-500}
      FAILURE_ACTION: ${FAILURE_ACTION:-}
      FAILURE_TARGET: ${FAILURE_TARGET:-}
      FAILURE_AFTER_SECONDS: ${FAILURE_AFTER_SECONDS:-0}
      SUMMARY_POLL_MILLISECONDS: ${SUMMARY_POLL_MILLISECONDS:-250}
      MAX_SUMMARY_WAIT_SECONDS: ${MAX_SUMMARY_WAIT_SECONDS:-30}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_AMQP_PORT: ${RABBITMQ_AMQP_PORT:-5672}
      RABBITMQ_STREAM_PORT: ${RABBITMQ_STREAM_PORT:-5552}
      RABBITMQ_MANAGEMENT_PORT: ${RABBITMQ_MANAGEMENT_PORT:-15672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM: ${RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM:-producer-to-transformer}
      RABBITMQ_TRANSFORMER_TO_SINK_STREAM: ${RABBITMQ_TRANSFORMER_TO_SINK_STREAM:-transformer-to-sink}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_PRODUCER_TO_TRANSFORMER_SUBJECT: ${NATS_PRODUCER_TO_TRANSFORMER_SUBJECT:-producer.to.transformer}
      NATS_TRANSFORMER_TO_SINK_SUBJECT: ${NATS_TRANSFORMER_TO_SINK_SUBJECT:-transformer.to.sink}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC: ${KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC:-producer-to-transformer}
      KAFKA_TRANSFORMER_TO_SINK_TOPIC: ${KAFKA_TRANSFORMER_TO_SINK_TOPIC:-transformer-to-sink}
    volumes:
      - ./results:/results
      - ../../datasets:/datasets:ro
    profiles:
      - manual
