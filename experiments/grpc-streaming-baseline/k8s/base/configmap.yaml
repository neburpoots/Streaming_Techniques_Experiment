apiVersion: v1
kind: ConfigMap
metadata:
  name: grpc-streaming-baseline-config
  namespace: streaming-experiments
data:
  RUN_ID: grpc-stream-k8s
  TRANSPORT_MODE: client-streaming
  WORKLOAD_SOURCE: synthetic
  PROFILE: bulk
  TOTAL_MESSAGES: "50000"
  PAYLOAD_BYTES: "1024"
  DATASET_DIR: /datasets
  DATASET_FILES: ""
  DATASET_ROWS_PER_MESSAGE: "1"
  DATASET_REPEAT_COUNT: "1"
  CONCURRENCY: "1"
  TARGET_MESSAGES_PER_SECOND: "0"
  TRANSFORMER_WORK_ITERATIONS: "0"
  SINK_PROCESS_DELAY_MS: "0"
  SUMMARY_POLL_MILLISECONDS: "250"
  MAX_SUMMARY_WAIT_SECONDS: "120"
  MAX_RETRY_ATTEMPTS: "0"
  RETRY_BACKOFF_MS: "500"
  FAILURE_ACTION: ""
  FAILURE_TARGET: ""
  FAILURE_AFTER_SECONDS: "0"
  RABBITMQ_HOST: grpc-stream-rabbitmq
  RABBITMQ_AMQP_PORT: "5672"
  RABBITMQ_STREAM_PORT: "5552"
  RABBITMQ_MANAGEMENT_PORT: "15672"
  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: guest
  RABBITMQ_VHOST: "/"
  RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM: producer-to-transformer
  RABBITMQ_TRANSFORMER_TO_SINK_STREAM: transformer-to-sink
  NATS_URL: nats://grpc-stream-nats:4222
  NATS_PRODUCER_TO_TRANSFORMER_SUBJECT: producer.to.transformer
  NATS_TRANSFORMER_TO_SINK_SUBJECT: transformer.to.sink
  KAFKA_BROKERS: grpc-stream-kafka:9092
  KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC: producer-to-transformer
  KAFKA_TRANSFORMER_TO_SINK_TOPIC: transformer-to-sink
  KAFKA_TOPIC_PARTITIONS: "16"
