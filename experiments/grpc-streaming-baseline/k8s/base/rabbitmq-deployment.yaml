apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-stream-rabbitmq
  namespace: streaming-experiments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-stream-rabbitmq
  template:
    metadata:
      labels:
        app: grpc-stream-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - rabbitmq-plugins enable --offline rabbitmq_stream rabbitmq_stream_management && rabbitmq-server
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_DEFAULT_VHOST
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_VHOST
            - name: RABBITMQ_ERLANG_COOKIE
              value: benchmark-cookie
            - name: RABBITMQ_LOGS
              value: "-"
          volumeMounts:
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 5552
              name: stream
            - containerPort: 15672
              name: management
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: rabbitmq-config
          configMap:
            name: grpc-stream-rabbitmq-config