apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-stream-sink
  namespace: streaming-experiments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-stream-sink
  template:
    metadata:
      labels:
        app: grpc-stream-sink
    spec:
      containers:
        - name: sink
          image: grpc-streaming-baseline-sink:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LISTEN_ADDR
              value: ":50052"
            - name: METRICS_ADDR
              value: ":9102"
            - name: RESULT_DIR
              value: /results
            - name: SINK_PROCESS_DELAY_MS
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: SINK_PROCESS_DELAY_MS
          ports:
            - containerPort: 50052
              name: grpc
            - containerPort: 9102
              name: metrics
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
