apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-stream-sink
  namespace: streaming-experiments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-stream-sink
  template:
    metadata:
      labels:
        app: grpc-stream-sink
    spec:
      containers:
        - name: sink
          image: grpc-streaming-baseline-sink:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LISTEN_ADDR
              value: ":50052"
            - name: METRICS_ADDR
              value: ":9102"
            - name: RESULT_DIR
              value: /results
            - name: TRANSPORT_MODE
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: TRANSPORT_MODE
            - name: GRPC_MAX_MESSAGE_BYTES
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: GRPC_MAX_MESSAGE_BYTES
            - name: SINK_PROCESS_DELAY_MS
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: SINK_PROCESS_DELAY_MS
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_AMQP_PORT
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_AMQP_PORT
            - name: RABBITMQ_STREAM_PORT
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_STREAM_PORT
            - name: RABBITMQ_MANAGEMENT_PORT
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_MANAGEMENT_PORT
            - name: RABBITMQ_USER
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_VHOST
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_VHOST
            - name: RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM
            - name: RABBITMQ_TRANSFORMER_TO_SINK_STREAM
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_TRANSFORMER_TO_SINK_STREAM
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: NATS_URL
            - name: NATS_PRODUCER_TO_TRANSFORMER_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: NATS_PRODUCER_TO_TRANSFORMER_SUBJECT
            - name: NATS_TRANSFORMER_TO_SINK_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: NATS_TRANSFORMER_TO_SINK_SUBJECT
            - name: NATS_STREAM_REPLICAS
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: NATS_STREAM_REPLICAS
            - name: NATS_STREAM_MAX_BYTES
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: NATS_STREAM_MAX_BYTES
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: KAFKA_BROKERS
            - name: KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC
            - name: KAFKA_TRANSFORMER_TO_SINK_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: KAFKA_TRANSFORMER_TO_SINK_TOPIC
          ports:
            - containerPort: 50052
              name: grpc
            - containerPort: 9102
              name: metrics
          volumeMounts:
            - name: results
              mountPath: /results
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: experiment-results
