apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-stream-transformer
  namespace: streaming-experiments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-stream-transformer
  template:
    metadata:
      labels:
        app: grpc-stream-transformer
    spec:
      containers:
        - name: transformer
          image: grpc-streaming-baseline-transformer:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RUN_ID
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RUN_ID
            - name: LISTEN_ADDR
              value: ":50051"
            - name: METRICS_ADDR
              value: ":9101"
            - name: CONCURRENCY
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: CONCURRENCY
            - name: TRANSPORT_MODE
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: TRANSPORT_MODE
            - name: SINK_ADDR
              value: grpc-stream-sink:50052
            - name: TRANSFORMER_WORK_ITERATIONS
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: TRANSFORMER_WORK_ITERATIONS
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_AMQP_PORT
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_AMQP_PORT
            - name: RABBITMQ_STREAM_PORT
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_STREAM_PORT
            - name: RABBITMQ_MANAGEMENT_PORT
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_MANAGEMENT_PORT
            - name: RABBITMQ_USER
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_VHOST
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_VHOST
            - name: RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_PRODUCER_TO_TRANSFORMER_STREAM
            - name: RABBITMQ_TRANSFORMER_TO_SINK_STREAM
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: RABBITMQ_TRANSFORMER_TO_SINK_STREAM
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: NATS_URL
            - name: NATS_PRODUCER_TO_TRANSFORMER_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: NATS_PRODUCER_TO_TRANSFORMER_SUBJECT
            - name: NATS_TRANSFORMER_TO_SINK_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: NATS_TRANSFORMER_TO_SINK_SUBJECT
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: KAFKA_BROKERS
            - name: KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: KAFKA_PRODUCER_TO_TRANSFORMER_TOPIC
            - name: KAFKA_TRANSFORMER_TO_SINK_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: KAFKA_TRANSFORMER_TO_SINK_TOPIC
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9101
              name: metrics
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
