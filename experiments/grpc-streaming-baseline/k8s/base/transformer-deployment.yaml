apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-stream-transformer
  namespace: streaming-experiments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-stream-transformer
  template:
    metadata:
      labels:
        app: grpc-stream-transformer
    spec:
      containers:
        - name: transformer
          image: grpc-streaming-baseline-transformer:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LISTEN_ADDR
              value: ":50051"
            - name: METRICS_ADDR
              value: ":9101"
            - name: SINK_ADDR
              value: grpc-stream-sink:50052
            - name: TRANSFORMER_WORK_ITERATIONS
              valueFrom:
                configMapKeyRef:
                  name: grpc-streaming-baseline-config
                  key: TRANSFORMER_WORK_ITERATIONS
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9101
              name: metrics
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
