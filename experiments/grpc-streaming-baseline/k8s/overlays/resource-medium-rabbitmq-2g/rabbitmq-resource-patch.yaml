apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-stream-rabbitmq
  namespace: streaming-experiments
spec:
  template:
    spec:
      containers:
        - name: rabbitmq
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 2Gi