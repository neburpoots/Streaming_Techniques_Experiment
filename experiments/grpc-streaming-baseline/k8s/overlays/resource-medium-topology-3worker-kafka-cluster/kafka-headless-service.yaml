apiVersion: v1
kind: Service
metadata:
  name: grpc-stream-kafka-headless
  namespace: streaming-experiments
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: grpc-stream-kafka
  ports:
    - name: client
      port: 9092
      targetPort: client
    - name: controller
      port: 9093
      targetPort: controller
