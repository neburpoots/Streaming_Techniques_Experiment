apiVersion: v1
kind: ConfigMap
metadata:
  name: grpc-stream-nats-config
  namespace: streaming-experiments
data:
  nats.conf: |
    listen: 0.0.0.0:4222

    cluster {
      name: grpc-stream-nats
      listen: 0.0.0.0:6222
      routes: [
        nats://grpc-stream-nats-0.grpc-stream-nats-headless.streaming-experiments.svc.cluster.local:6222,
        nats://grpc-stream-nats-1.grpc-stream-nats-headless.streaming-experiments.svc.cluster.local:6222,
        nats://grpc-stream-nats-2.grpc-stream-nats-headless.streaming-experiments.svc.cluster.local:6222
      ]
    }

    jetstream {
      store_dir: "/data/jetstream"
      max_mem_store: 1536MB
      max_file_store: 40GB
    }
