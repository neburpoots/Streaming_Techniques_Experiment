apiVersion: v1
kind: Service
metadata:
  name: grpc-stream-nats-headless
  namespace: streaming-experiments
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: grpc-stream-nats
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: cluster
      port: 6222
      targetPort: cluster
