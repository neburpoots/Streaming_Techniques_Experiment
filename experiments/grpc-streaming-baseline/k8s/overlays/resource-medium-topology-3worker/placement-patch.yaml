    metadata:
      labels:
        benchmark.dynamos/component: producer
        benchmark.dynamos/topology-sensitivity: "true"
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: benchmark.dynamos/placement
                    operator: NotIn
                    values:
                      - broker
