apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-stream-sink
  namespace: streaming-experiments
spec:
  template:
    metadata:
      labels:
        benchmark.dynamos/component: sink
        benchmark.dynamos/topology-sensitivity: "true"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: benchmark.dynamos/placement
                    operator: In
                    values:
                      - sink
---
