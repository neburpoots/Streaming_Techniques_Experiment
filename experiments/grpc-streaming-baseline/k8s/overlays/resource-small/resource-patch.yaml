apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-stream-sink
  namespace: streaming-experiments
spec:
  template:
    spec:
      containers:
        - name: sink
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-stream-transformer
  namespace: streaming-experiments
spec:
  template:
    spec:
      containers:
        - name: transformer
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grpc-stream-producer
  namespace: streaming-experiments
spec:
  template:
    spec:
      containers:
        - name: producer
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
